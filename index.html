
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
            <style>
                body { margin: 0; background: #000; font-family: 'Open Sans', sans-serif; }
                
            .container { width: 100vw; height: 100vh; max-width: 600px; margin: auto; position: relative; }
            .item { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; overflow: hidden; }
            .item:first-child { display: block; }
            .video-bg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
            .video-bg video, .video-bg iframe { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
            
            .content { 
                position: absolute; top: 50%; left: 30px; transform: translateY(-50%); 
                color: #fff; z-index: 10; width: 80%; padding: 35px;
                border-radius: 20px; background: rgba(0,0,0,0.3); backdrop-filter: blur(12px);
                border: 1px solid rgba(255,255,255,0.1);
            }
            .name { font-family: 'Montserrat'; font-size: 50px; font-weight: 900; text-transform: uppercase; padding-left: 20px; line-height: 1.1; text-shadow: 5px 5px 20px rgba(0,0,0,1); }
            .des { font-size: 16px; margin-top: 20px; line-height: 1.5; color: #eee; font-weight: 400; }
            .tag { display: inline-block; padding: 5px 15px; border-radius: 5px; color: #000; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; font-size: 14px; }
        
                .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to right, rgba(0,0,0,0.8), transparent, rgba(0,0,0,0.8)); z-index: 5; }
                .controls { position: absolute; bottom: 50px; width: 100%; text-align: center; z-index: 100; }
                .controls button { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; background: rgba(0,0,0,0.4); color: #fff; font-size: 20px; cursor: pointer; margin: 0 15px; transition: 0.3s; }
                .controls button:hover { background: orange; color: #000; border-color: orange; transform: scale(1.1); }
            </style>
        </head>
        <body>
            <div class="container">
                <div class="slide-wrapper"></div>
                <div class="controls">
                    <button onclick="prev()">❮</button>
                    <button onclick="next()">❯</button>
                </div>
            </div>
            <script>
                let current = 0;
                let items = document.querySelectorAll('.item');
                function show(index) {
                    items.forEach(it => it.style.display = 'none');
                    items[index].style.display = 'block';
                }
                function next() { current = (current + 1) % items.length; show(current); }
                function prev() { current = (current - 1 + items.length) % items.length; show(current); }
            </script>
        </body>
        </html>
