
        <html><head><meta charset="UTF-8"><style>
            body { margin:0; background:#000; overflow:hidden; font-family:sans-serif; }
            .container { width:100vw; height:100vh; position:relative; }
            .slide .item { width:200px; height:300px; position:absolute; top:50%; transform:translate(0,-50%); border-radius:20px; background-size:cover; transition:0.5s; }
            .slide .item:nth-child(1), .slide .item:nth-child(2) { top:0; left:0; transform:translate(0,0); border-radius:0; width:100%; height:100%; }
            .slide .item:nth-child(3) { left:60%; }
            .slide .item:nth-child(4) { left:calc(60% + 220px); }
            .item .content { position:absolute; top:50%; left:100px; color:#fff; display:none; }
            .slide .item:nth-child(2) .content { display:block; }
            .name { font-size:60px; font-weight:bold; }
            .btn { position:absolute; bottom:50px; width:100%; text-align:center; }
            .btn button { width:50px; height:50px; cursor:pointer; margin:0 10px; }
        </style></head><body>
            <div class="container"><div class="slide">
                <div class="item" style="background-image: url(assets/1);">
                    <div class="content">
                        <div class="name">abc</div>
                        <div class="des">1</div>
                        <div class="note" style="color:orange;">2</div>
                    </div>
                </div></div>
            <div class="btn"><button class="next">NEXT ❯</button></div></div>
            <script>
                document.querySelector('.next').onclick = () => {
                    let items = document.querySelectorAll('.item');
                    document.querySelector('.slide').appendChild(items[0]);
                }
            </script>
        </body></html>
